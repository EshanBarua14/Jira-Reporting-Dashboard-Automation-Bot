<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#312E81" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <!-- Outer Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#4F46E5" stroke-opacity="0.2" stroke-width="12" />

  <!-- Shield Shape (Bulletproof Motif) -->
  <path d="M 256 96 C 300 96 380 120 384 160 C 384 280 320 380 256 416 C 192 380 128 280 128 160 C 132 120 212 96 256 96 Z" fill="url(#shield-grad)" />

  <!-- Chart Columns Trend (Reporting Motif) -->
  <rect x="190" y="240" width="30" height="100" rx="6" fill="#FFFFFF" fill-opacity="0.85" />
  <rect x="241" y="190" width="30" height="150" rx="6" fill="url(#glow)" />
  <rect x="292" y="140" width="30" height="200" rx="6" fill="#6366F1" />

  <!-- Overlapping Sparkline Overlay -->
  <polyline fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" points="160,260 210,230 260,170 310,220 350,150" />
  <circle cx="350" cy="150" r="10" fill="#FFFFFF" />

  <!-- Sub-task Checked Badge -->
  <circle cx="380" cy="360" r="40" fill="#10B981" />
  <path d="M 360,360 L 375,375 L 400,345" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
